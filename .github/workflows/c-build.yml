name: C Build and Test

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build ft_printf library
        run: make -C ft_printf re

      - name: Build test programs
        run: make -C ft_printf_test re

      - name: Run return-value tests
        run: make -C ft_printf_test run

      - name: Run output comparison tests
        run: make -C ft_printf_test compare
